name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-macos-arm64:
    name: Build and Test (macOS arm64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build and test macOS arm64
        run: >
          ./gradlew
          compileKotlinMacosArm64
          macosArm64Test
          --no-configuration-cache

  build-linux:
    name: Build and Test (Linux x64 / Linux arm64 / JS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          check-latest: true

      - name: Set up Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Check JavaScript toolchain
        run: |
          node --version
          npm --version
          yarn --version

      - name: Build and test Linux + JS targets
        env:
          ORG_GRADLE_PROJECT_kotlin_js_yarn_download: "false"
        run: >
          ./gradlew
          compileKotlinLinuxX64
          compileKotlinLinuxArm64
          linuxX64Test
          jsBrowserTest
          jsNodeTest
          --no-configuration-cache

  build-windows:
    name: Build and Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Build and test Windows target
        run: ./gradlew mingwX64Test --no-configuration-cache
