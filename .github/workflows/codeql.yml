name: CodeQL

# CodeQL `java-kotlin` extractor uses `build-mode: manual` so the Kotlin
# compiler is invoked directly and CodeQL can trace the compilation.
# `--no-build-cache` prevents Gradle from short-circuiting compilation
# with cached outputs, which would leave CodeQL nothing to trace.
# `javascript-typescript` covers the generated JS test bundle; `actions`
# covers the workflow files themselves.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.build-mode == 'manual'
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        if: matrix.build-mode == 'manual'
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Compile Android Kotlin (JVM bytecode) for CodeQL extraction
        if: matrix.build-mode == 'manual'
        # `compileAndroidMain` emits real JVM `.class` files under
        # `build/classes/kotlin/android/main`. `--rerun-tasks` + `--no-build-cache`
        # defeat Gradle's up-to-date check and `setup-gradle`'s cache restore so
        # kotlinc is actually invoked. `kotlin.compiler.execution.strategy=
        # out-of-process` spawns a fresh kotlinc JVM per compilation so CodeQL's
        # LD_PRELOAD tracer has a process exec to intercept.
        run: |
          ./gradlew compileAndroidMain \
            --rerun-tasks \
            --no-build-cache \
            -Pkotlin.compiler.execution.strategy=out-of-process \
            --no-configuration-cache \
            --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
