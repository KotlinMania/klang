name: CodeQL

# klang is a Kotlin Multiplatform project with Native and JS targets only —
# no JVM target. The CodeQL `java-kotlin` extractor is configured with
# `build-mode: manual` so that the Kotlin compiler is invoked directly and
# CodeQL can trace the compilation.  Native targets are disabled via
# KLANG_NO_ENABLE_NATIVE so that the build works on the ubuntu-latest runner.
# `--no-build-cache` prevents Gradle from short-circuiting compilation with
# cached outputs, which would leave CodeQL nothing to trace.
# `javascript-typescript` covers the generated JS test bundle; `actions`
# covers the workflow files themselves.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build (Kotlin/JS — no cache so CodeQL can trace compilation)
        if: matrix.build-mode == 'manual'
        env:
          KLANG_NO_ENABLE_NATIVE: "1"
        run: |
          ./gradlew --no-daemon --no-build-cache compileKotlinJs compileTestKotlinJs

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
