name: CodeQL

# CodeQL `java-kotlin` extractor uses `build-mode: manual` so the Kotlin
# compiler is invoked directly and CodeQL can trace the compilation.
# `--no-build-cache` prevents Gradle from short-circuiting compilation
# with cached outputs, which would leave CodeQL nothing to trace.
# `javascript-typescript` covers the generated JS test bundle; `actions`
# covers the workflow files themselves.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build (Kotlin/JS — no cache so CodeQL can trace compilation)
        if: matrix.build-mode == 'manual'
        run: |
          ./gradlew --no-daemon --no-build-cache compileKotlinJs compileTestKotlinJs

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
