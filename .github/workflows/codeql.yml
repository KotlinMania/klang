name: CodeQL

# klang is a Kotlin Multiplatform project with Native and JS targets only —
# no JVM target. The CodeQL `java-kotlin` extractor instruments JVM `kotlinc`
# invocations only; Kotlin/Native and Kotlin/JS compilations are not traced,
# so the extractor produces an empty database and finalize fails with
# "CodeQL could not process any code written in Java/Kotlin". We therefore
# do not analyze `java-kotlin` here. `javascript-typescript` covers the
# generated JS test bundle; `actions` covers the workflow files themselves.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
