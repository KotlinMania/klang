name: CodeQL

# klang ships JS + Native + Android targets. The Android KMP target is here
# specifically to give CodeQL's `java-kotlin` extractor real JVM `.class`
# files to scan: `compileAndroidMain` runs the JVM `kotlinc`, which the
# extractor's LD_PRELOAD tracer hooks. The `nonAndroidMain` intermediate
# source set holds the generic-CPointer<T> operator overloads that clash
# under JVM erasure; those four files are scanned by the Kotlin compiler
# on Native and JS but excluded from the Android compile. Native targets
# are disabled here via KLANG_NO_ENABLE_NATIVE so the build works on
# `ubuntu-latest`. `javascript-typescript` and `actions` use `build-mode: none`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.build-mode == 'manual'
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        if: matrix.build-mode == 'manual'
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Compile Android Kotlin (JVM bytecode) for CodeQL extraction
        if: matrix.build-mode == 'manual'
        env:
          KLANG_NO_ENABLE_NATIVE: "1"
        # `compileAndroidMain` emits real JVM `.class` files under
        # `build/classes/kotlin/android/main`. `--rerun-tasks` + `--no-build-cache`
        # defeat Gradle's up-to-date check and `setup-gradle`'s cache restore so
        # kotlinc is actually invoked. `kotlin.compiler.execution.strategy=
        # out-of-process` spawns a fresh kotlinc JVM per compilation so CodeQL's
        # LD_PRELOAD tracer has a process exec to intercept.
        run: |
          ./gradlew compileAndroidMain \
            --rerun-tasks \
            --no-build-cache \
            -Pkotlin.compiler.execution.strategy=out-of-process \
            --no-configuration-cache \
            --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
