name: CodeQL

# klang is a Kotlin Multiplatform project with Native and JS targets only —
# no JVM target. The CodeQL `java-kotlin` extractor with `autobuild` fails
# because there are no JVM compilation steps to trace. We include `java-kotlin`
# here with `build-mode: none` (compilation-free extraction) to prevent
# GitHub's default code-scanning setup from running `java-kotlin` with
# `autobuild` as a separate workflow. `javascript-typescript` covers the
# generated JS test bundle; `actions` covers the workflow files themselves.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
